apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-replicaset
  labels:
    name: myapp
    type: backend
spec:
  template:

    metadata:
      name: myapp-pod
      labels:
        name: myapp
        type: backend
    spec:
      containers:
        - name: nginx
          image: nginx
  replicas: 2
  selector:
    matchLabels:
      type: backend
